<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${projectName}">Connectify Solutions</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="navbar dashboard-nav">
    <div class="brand">
        <span class="logo">🎫</span>
        <div>
            <strong>Connectify</strong>
            <small>Solutions</small>
        </div>
    </div>
    <nav class="top-actions">
        <a th:href="@{/events}" class="btn secondary">Explorar eventos</a>
        <a th:href="@{/login}" class="btn primary">Iniciar sesión</a>
    </nav>
</header>

<main class="hero">
    <section class="hero-card">
        <p class="badge">Spring Boot + Thymeleaf + JPA</p>
        <h1 th:text="${projectName}">Connectify Solutions</h1>
        <p th:text="${subtitle}">
            Migración progresiva a Spring Boot + Thymeleaf + JPA + MySQL/MariaDB
        </p>

        <div class="actions">
            <a th:href="@{/events}" class="btn primary">Explorar eventos</a>
            <a th:href="@{/login}" class="btn secondary">Iniciar sesión</a>
            <a th:href="@{/dashboard}" class="btn secondary">Ir a mi dashboard</a>
        </div>
    </section>
</main>
</body>
</html>
