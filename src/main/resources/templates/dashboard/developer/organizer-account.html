<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Organizador</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="dashboard-page">
  <h1>Crear cuenta de Organizador</h1>
  <form th:action="@{/dashboard/developer/accounts/organizer}" method="post">
    <label>Nombres <input name="firstName" required></label>
    <label>Apellidos <input name="lastName" required></label>
    <label>DNI <input name="dni" required></label>
    <label>Correo <input name="email" type="email" required></label>
    <label>Contraseña <input name="password" type="password" required></label>
    <button type="submit">Crear Organizador</button>
  </form>
</main>
</body>
</html>
