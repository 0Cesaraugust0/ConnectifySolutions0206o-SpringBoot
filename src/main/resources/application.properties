spring.application.name=connectify-solutions

server.port=8080

# Base de datos local MySQL/MariaDB
spring.datasource.url=jdbc:mysql://localhost:3308/connectify_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# IZIPay: los valores sensibles se inyectan solo como variables de entorno.
# Nunca guardar usuario, contraseña, HMAC ni claves privadas en Git.
izipay.enabled=${IZIPAY_ENABLED:false}
izipay.endpoint=${IZIPAY_ENDPOINT:}
izipay.username=${IZIPAY_USERNAME:}
izipay.password=${IZIPAY_PASSWORD:}
izipay.public-key=${IZIPAY_PUBLIC_KEY:}
izipay.hmac-sha256-key=${IZIPAY_HMAC_SHA256_KEY:}
izipay.currency=${IZIPAY_CURRENCY:PEN}
