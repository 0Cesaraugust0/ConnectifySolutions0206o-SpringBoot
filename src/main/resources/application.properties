spring.application.name=connectify-solutions

server.port=8080

# Base de datos local MySQL/MariaDB
spring.datasource.url=jdbc:mysql://localhost:3308/connectify_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# IZIPay SmartForm: valores sensibles solo por variables de entorno o application-local.properties.
# Nunca guardar usuario, contraseña REST, HMAC o claves privadas en Git.
izipay.enabled=${IZIPAY_ENABLED:false}
izipay.mode=${IZIPAY_MODE:TEST}
izipay.endpoint=${IZIPAY_ENDPOINT:}
izipay.username=${IZIPAY_USERNAME:}
izipay.password=${IZIPAY_PASSWORD:}
izipay.public-key=${IZIPAY_PUBLIC_KEY:}
izipay.hmac-sha256-key=${IZIPAY_HMAC_SHA256_KEY:}
izipay.smart-form-script-url=${IZIPAY_SMARTFORM_SCRIPT_URL:}
izipay.success-url=${IZIPAY_SUCCESS_URL:http://localhost:8080/payments/izipay/success}
izipay.error-url=${IZIPAY_ERROR_URL:http://localhost:8080/payments/izipay/error}
izipay.cancel-url=${IZIPAY_CANCEL_URL:http://localhost:8080/payments/izipay/cancel}
izipay.notification-url=${IZIPAY_NOTIFICATION_URL:}
izipay.currency=${IZIPAY_CURRENCY:PEN}
